# CI validates server (Prisma + better-sqlite3) and client builds.
#
# Deploy (push to main only): SSH (password auth) into your VPS, pull the repo, build
# server + client, then reload the API with PM2. Non-interactive SSH uses a minimal PATH;
# the remote script loads nvm/fnm and common bin dirs so npm/pm2 match an interactive shell.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: file:./prisma/ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run build

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run build

  deploy-vps:
    needs: [server, client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS deploy secrets
        id: vps
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_PASSWORD" ]; then
            echo "VPS deploy skipped: add secrets VPS_HOST, VPS_USER, VPS_PASSWORD to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy on VPS (git pull, build, PM2)
        if: steps.vps.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ vars.VPS_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 25m
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:/snap/bin:$HOME/.local/bin:$PATH"
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            command -v nvm >/dev/null 2>&1 && nvm use default >/dev/null 2>&1 || true
            if command -v fnm >/dev/null 2>&1; then
              eval "$(fnm env)"
            fi
            set -euo pipefail
            command -v npm >/dev/null || { echo "npm not on PATH after loading nvm/fnm. On the VPS run: which npm"; exit 127; }
            APP_PATH='${{ vars.VPS_APP_PATH }}'
            PM2_NAME='${{ vars.VPS_PM2_NAME }}'
            if [ -z "$APP_PATH" ]; then
              echo "Set repository variable VPS_APP_PATH (clone path on the server, e.g. /var/www/appifylab)."
              exit 1
            fi
            PM2_NAME="${PM2_NAME:-appifylab-api}"
            cd "$APP_PATH"
            git fetch origin main
            git checkout main
            git pull origin main
            cd server
            # Force devDependencies (tsc, prisma CLI). Some VPS set NODE_ENV=production or
            # npm production mode so strongly that NODE_ENV=development on one line is ignored.
            export NPM_CONFIG_PRODUCTION=false
            unset NODE_ENV
            npm ci --include=dev
            npx prisma generate
            npx prisma db push
            rm -rf dist
            npm run build || { ./node_modules/.bin/tsc --pretty false 2>&1; exit 1; }
            test -f dist/index.js || { echo "Missing server/dist/index.js"; ls -la dist || true; exit 1; }
            SERVER_DIR="$APP_PATH/server"
            PM2_ENTRY="$SERVER_DIR/dist/index.js"
            if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
              pm2 reload "$PM2_NAME" --update-env
            else
              pm2 start "$PM2_ENTRY" --name "$PM2_NAME" --cwd "$SERVER_DIR"
            fi
            pm2 save
            cd ../client
            export NPM_CONFIG_PRODUCTION=false
            unset NODE_ENV
            npm ci --include=dev
            npm run build
